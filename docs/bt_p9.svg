<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="cyberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <style>
      .bg { fill: transparent; }
      .glow-path {
        stroke: url(#cyberGradient);
        stroke-width: 12;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
      .accent-path {
        stroke: #ffffff;
        stroke-width: 10;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        opacity: 0.9;
      }
      .text-main {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-weight: 800;
        fill: #ffffff;
        font-size: 38px;
        letter-spacing: 6px;
      }
      .text-sub {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-weight: 500;
        fill: #00f2fe;
        font-size: 14px;
        letter-spacing: 8px;
        opacity: 0.8;
      }
    </style>
  </defs>

  <rect width="400" height="400" class="bg" />

  <g transform="translate(0, -10)">
    <path d="M 200,80 L 200,240 M 200,80 L 250,120 L 150,195 L 200,235 L 250,195 L 200,155" class="glow-path" />
    
    <path d="M 140,130 A 75,75 0 0,0 140,210" class="accent-path" />
    <path d="M 260,130 A 75,75 0 0,1 267,185" class="glow-path" stroke-width="6" />
    
    <circle cx="140" cy="225" r="5" fill="#00f2fe" />
  </g>

  <text x="204" y="315" text-anchor="middle" class="text-main">P9_BT</text>
  <text x="204" y="342" text-anchor="middle" class="text-sub">AGENT HEADSET</text>
</svg>
